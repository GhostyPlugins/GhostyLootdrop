# ============================================================
#             GhostyLootdrop - Language: English
# ============================================================
# Supports & color codes and hex codes like &#RRGGBB

messages:
  # General
  prefix: "&8[&6GhostyLootdrop&8] &r"
  no-permission: "&cYou don't have permission to do this."
  player-only: "&cThis command can only be executed by a player."
  reload-success: "&aPlugin successfully reloaded!"
  reload-fail: "&cAn error occurred while reloading the plugin."
  unknown-command: "&cUnknown command. Use &e/gld help &cfor help."
  invalid-args: "&cInvalid arguments. Use &e/gld help &cfor help."

  # Help
  help:
    header: "&8&m============================================"
    title: "         &6&lGhostyLootdrop &8- &eHelp"
    separator: "&8&m============================================"
    create: "&e/gld create &7- &fOpen setup GUI to create a drop"
    start: "&e/gld start <id> &7- &fLaunch a saved drop"
    list: "&e/gld list &7- &fList all active drops"
    remove: "&e/gld remove <id> &7- &fRemove an active drop"
    reload: "&e/gld reload &7- &fReload the plugin"
    footer: "&8&m============================================"

  # Create / Setup
  setup-opened: "&aSetup GUI opened. Put items into the inventory!"
  setup-saved: "&aLootdrop &e{id} &asaved successfully!"
  setup-cancelled: "&cSetup cancelled."
  setup-empty: "&cYou must add at least one item!"
  drop-name-set: "&aLootdrop name set to &e{name}&a."
  drop-name-prompt: "&eEnter the name for this drop in chat (or type 'cancel'):"

  # Launch / Spawn
  drop-launching: "&aLaunching lootdrop &e{id}&a at your location..."
  drop-spawned-title: "&6&l✦ LOOT DROP ✦"
  drop-spawned-sub: "&e{name} &7| &f{world} &8| &e{x}&7, &e{y}&7, &e{z}"
  drop-landed-title: "&a&l✦ DROP LANDED ✦"
  drop-landed-sub: "&e{name} &7| &f{world} &8| &e{x}&7, &e{y}&7, &e{z}"
  drop-not-found: "&cNo drop found with ID &e{id}&c."

  # List
  list-header: "&8&m============================================"
  list-title: "         &6&lActive Loot Drops"
  list-entry: "  &8» &eID: &6{id} &8| &eName: &6{name} &8| &ePos: &6{x}&8,&6{y}&8,&6{z}"
  list-empty: "&7No active drops at the moment."
  list-footer: "&8&m============================================"

  # Remove
  drop-removed: "&aLootdrop &e{id} &ahas been removed."
  drop-remove-fail: "&cCould not remove drop &e{id}&c."

  # Open / Chest
  drop-opened: "&aYou opened the loot drop &e{name}&a!"
  drop-already-open: "&cThis drop is currently being opened by someone else."
  drop-no-permission: "&cYou don't have permission to open this drop."
  drop-depleted: "&7This loot drop is empty."
  drop-chest-closed: "&7Lootdrop &e{name} &7has been closed."
  drop-expired: "&7Lootdrop &e{name} &7has expired and been removed."

  # BossBar
  bossbar-falling: "&6Drop &e{name} &6is falling!"
  bossbar-landed: "&6Drop &e{name} &6has landed!"

  # Storage errors
  storage-error: "&cA storage error occurred. Please check the console."
  mysql-connect-fail: "&cCould not connect to MySQL! Falling back to YAML."
  mysql-connect-success: "&aMySQL connection established."

  # Setup GUI buttons
  gui:
    confirm-button: "&a&lSave & Launch"
    confirm-button-lore1: "&7Click to save the drop"
    confirm-button-lore2: "&7and set a name."
    cancel-button: "&c&lCancel"
    cancel-button-lore: "&7Cancel the setup."
    info-title: "&6&lLootdrop Setup"
    info-lore1: "&7Place your items in the free slots."
    info-lore2: "&7Click &aSave &7when you are done."
