name: GhostyLootdrop
version: 1.0.0
main: de.gergh0stface.ghostylootdrop.GhostyLootdrop
api-version: '1.21'
authors: [Ger_Gh0stface]
description: A powerful loot drop plugin with custom items, MySQL support and full language customization.

commands:
  ghostylootdrop:
    description: Main command for GhostyLootdrop
    aliases: [gld, lootdrop]
    usage: /ghostylootdrop <help|create|start|list|remove|reload>

permissions:
  ghostylootdrop.admin:
    description: Access to all admin commands
    default: op
  ghostylootdrop.create:
    description: Create a loot drop
    default: op
  ghostylootdrop.start:
    description: Start/launch a loot drop
    default: op
  ghostylootdrop.list:
    description: List active loot drops
    default: op
  ghostylootdrop.remove:
    description: Remove a loot drop
    default: op
  ghostylootdrop.reload:
    description: Reload the plugin
    default: op
  ghostylootdrop.use:
    description: Open and loot a drop chest
    default: true
